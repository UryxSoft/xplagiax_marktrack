<!-- loader_overlay.html -->
<style>
/* 1. Estructura Dark Glass Zero-Flicker */
#mt-global-loader {
    position: fixed;
    inset: 0;
    z-index: 9999999;
    background: radial-gradient(circle at 12% 12%, #4a7298 0%, #2a3b55 40%, #5d4a4a 80%, #7a6050 100%) !important;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    visibility: hidden;
    opacity: 0;
    transition: opacity 0.35s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.35s;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
}
#mt-global-loader.active {
    visibility: visible;
    opacity: 1;
}

/* 2. Book Loader (Uiverse.io by Nawsome) */
.loader {
  --background: linear-gradient(135deg, #23C4F8, #275EFE);
  --shadow: rgba(39, 94, 254, 0.28);
  --text: #ffffff; /* Adjusted for dark theme */
  --page: rgba(255, 255, 255, 0.36);
  --page-fold: rgba(255, 255, 255, 0.52);
  --duration: 3s;
  width: 200px;
  height: 140px;
  position: relative;
}

.loader:before, .loader:after {
  --r: -6deg;
  content: "";
  position: absolute;
  bottom: 8px;
  width: 120px;
  top: 80%;
  box-shadow: 0 16px 12px var(--shadow);
  transform: rotate(var(--r));
}

.loader:before {
  left: 4px;
}

.loader:after {
  --r: 6deg;
  right: 4px;
}

.loader div {
  width: 100%;
  height: 100%;
  border-radius: 13px;
  position: relative;
  z-index: 1;
  perspective: 600px;
  box-shadow: 0 4px 6px var(--shadow);
  background-image: var(--background);
}

.loader div ul {
  margin: 0;
  padding: 0;
  list-style: none;
  position: relative;
}

.loader div ul li {
  --r: 180deg;
  --o: 0;
  --c: var(--page);
  position: absolute;
  top: 10px;
  left: 10px;
  transform-origin: 100% 50%;
  color: var(--c);
  opacity: var(--o);
  transform: rotateY(var(--r));
  -webkit-animation: var(--duration) ease infinite;
  animation: var(--duration) ease infinite;
}

.loader div ul li:nth-child(2) { --c: var(--page-fold); -webkit-animation-name: page-2; animation-name: page-2; }
.loader div ul li:nth-child(3) { --c: var(--page-fold); -webkit-animation-name: page-3; animation-name: page-3; }
.loader div ul li:nth-child(4) { --c: var(--page-fold); -webkit-animation-name: page-4; animation-name: page-4; }
.loader div ul li:nth-child(5) { --c: var(--page-fold); -webkit-animation-name: page-5; animation-name: page-5; }

.loader div ul li svg {
  width: 90px;
  height: 120px;
  display: block;
}

.loader div ul li:first-child {
  --r: 0deg;
  --o: 1;
}

.loader div ul li:last-child {
  --o: 1;
}

.loader span {
  display: block;
  left: 0;
  right: 0;
  top: 100%;
  margin-top: 20px;
  text-align: center;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.05em;
  animation: mt-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
}

@keyframes page-2 {
  0% { transform: rotateY(180deg); opacity: 0; }
  20% { opacity: 1; }
  35%, 100% { opacity: 0; }
  50%, 100% { transform: rotateY(0deg); }
}

@keyframes page-3 {
  15% { transform: rotateY(180deg); opacity: 0; }
  35% { opacity: 1; }
  50%, 100% { opacity: 0; }
  65%, 100% { transform: rotateY(0deg); }
}

@keyframes page-4 {
  30% { transform: rotateY(180deg); opacity: 0; }
  50% { opacity: 1; }
  65%, 100% { opacity: 0; }
  80%, 100% { transform: rotateY(0deg); }
}

@keyframes page-5 {
  45% { transform: rotateY(180deg); opacity: 0; }
  65% { opacity: 1; }
  80%, 100% { opacity: 0; }
  95%, 100% { transform: rotateY(0deg); }
}

@keyframes mt-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
}

/* Light Mode Override */
[data-theme='light'] #mt-global-loader { background: rgba(250, 250, 250, 0.98) !important; }
[data-theme='light'] .loader span { color: #275EFE; }

</style>

<script>
(function() {
    const loader = document.getElementById('mt-global-loader');
    const textEl = document.getElementById('mt-loader-text');
    
    // Check navigation states
    const isNavigating = sessionStorage.getItem('mt_navigating');
    const targetText = sessionStorage.getItem('mt_loader_msg');
    
    // Retenemos control inmediato
    if (isNavigating === 'true') {
        loader.classList.add('active');
        if (targetText) textEl.textContent = targetText;
    }

    // Hide immediately when requested
    function hideLoader() {
        if (!loader.classList.contains('active')) return;
        loader.classList.remove('active');
        sessionStorage.removeItem('mt_navigating');
        sessionStorage.removeItem('mt_loader_msg');
    }

    // Ocultar si DOM ready o fallback
    if (document.readyState === 'complete') {
        setTimeout(hideLoader, 150);
    } else {
        window.addEventListener('load', () => setTimeout(hideLoader, 150));
        // Max UI lock time -> 3.5 seconds
        setTimeout(hideLoader, 3500);
    }

    // API Global reutilizable
    window.AppLoader = {
        show: function(msg = "Loading workspace...", isCrossPage = true) {
            textEl.textContent = msg;
            
            // Retraso para no molestar si carga rápido (UX perceived performance)
            this.timeoutId = setTimeout(() => {
                loader.classList.add('active');
            }, 150);

            if (isCrossPage) {
                sessionStorage.setItem('mt_navigating', 'true');
                sessionStorage.setItem('mt_loader_msg', msg);
            }
        },
        hide: function() {
            clearTimeout(this.timeoutId);
            hideLoader();
        }
    };

    // Global navigation interceptor for MPA flow
    window.addEventListener('click', (e) => {
        // Skip if the click was already handled or prevented
        if (e.defaultPrevented) return;

        const link = e.target.closest('a');
        if (link && link.href && !link.target) {
            // Ignore anchor links or specific "no-loader" links
            if (link.hash || link.classList.contains('mt-no-loader') || link.getAttribute('onclick')) {
                return;
            }

            // Document edits and reviews
            // Be more specific to avoid triggering on every single link
            const url = link.href;
            if (url.includes('/invite/') || url.includes('/review/') || url.includes('/workspace/')) {
                window.AppLoader.show("Loading...");
            }
        }
    });

})();
</script>
