<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - XplagiaX MarkTrack</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='img/marktrack.ico') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth-forgot-inline.css') }}">
</head>

<body>
    <div class="container">
        <div class="logo">
            <h1>Xplagia<span>X</span> MarkTrack</h1>
        </div>

        <div class="card">
            <h2>Forgot Password</h2>
            <p>Enter your email and we'll send you a recovery link</p>

            <div id="success-alert" class="alert alert-success"></div>

            <form id="forgot-form" method="POST" action="{{ url_for('auth_bp.forgot_password') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>

                <button type="submit" class="submit-btn">Send Recovery Link</button>
            </form>

            <div class="back-link">
                <a href="{{ url_for('auth_bp.login') }}">← Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('forgot-form');
        const successAlert = document.getElementById('success-alert');

        form.addEventListener('submit', async function (e) {
            e.preventDefault();

            const formData = new FormData(form);

            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': formData.get('csrf_token')
                    },
                    body: JSON.stringify({ email: formData.get('email') })
                });

                const result = await response.json();
                successAlert.textContent = result.message || 'Check your email for the recovery link.';
                successAlert.classList.add('show');
                form.reset();
            } catch (error) {
                successAlert.textContent = 'If the email exists, you will receive a recovery link.';
                successAlert.classList.add('show');
            }
        });
    </script>
</body>

</html>
