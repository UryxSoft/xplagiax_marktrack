<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - XplagiaX MarkTrack</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='img/marktrack.ico') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth-forgot-v3.css') }}">
</head>

<body>
    <div class="bg-glow"></div>

    <div id="notification" class="notification"></div>

    <div class="auth-wrapper">
        <!-- ══════════════════════════════════════════════════════════
             FORMS AREA — Recovery Form
        ══════════════════════════════════════════════════════════════ -->
        <div class="forms-area">
            <div class="form-header">
                <div class="app-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="white" viewBox="0 0 16 16">
                        <path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
                    </svg>
                </div>
                <h1>Recovery Access</h1>
                <p class="subtitle">Enter your email to receive a secure recovery link.</p>
            </div>

            <form id="forgot-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" name="email" placeholder="name@company.com" required>
                </div>

                <button type="submit" class="btn-primary" id="submitBtn">Send Recovery Link</button>
            </form>

            <div class="back-link">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                <a href="{{ url_for('login') }}">Back to Login</a>
            </div>
        </div>

        <!-- ══════════════════════════════════════════════════════════
             OVERLAY — Branding & Context
        ══════════════════════════════════════════════════════════════ -->
        <div class="overlay-container">
            <div class="overlay-img"></div>
            <div class="overlay-tint"></div>
            <div class="overlay-content">
                <div class="overlay-badge">Security Portal</div>
                <h2>Secure Your Account</h2>
                <p>We use industry-standard encryption to protect your data. Follow the instructions sent to your email to reset your credentials.</p>
            </div>
        </div>
    </div>

    <script>
        const notification = document.getElementById('notification');
        function showNotification(msg, type = 'success') {
            notification.textContent = msg;
            notification.className = `notification notification-${type} show`;
            setTimeout(() => notification.classList.remove('show'), 4000);
        }

        const form = document.getElementById('forgot-form');
        const btn = document.getElementById('submitBtn');

        form.addEventListener('submit', async function (e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const csrf = document.querySelector('[name="csrf_token"]').value;

            btn.disabled = true;
            btn.textContent = 'Processing...';

            try {
                const response = await fetch("{{ url_for('auth_bp.forgot_password') }}", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrf
                    },
                    body: JSON.stringify({ email: email })
                });

                const result = await response.json();
                
                if (response.ok) {
                    showNotification(result.message || 'Recovery email sent. Please check your inbox.', 'success');
                    form.reset();
                } else {
                    showNotification(result.error || 'If the account exists, a link will be sent.', 'error');
                }
            } catch (error) {
                showNotification('An error occurred. Please try again later.', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send Recovery Link';
            }
        });
    </script>
    <footer class="footer" role="contentinfo" style="display: flex; align-items: center; justify-content: center; gap: 6px; flex-wrap: wrap;">
        <span>Powered by</span>
        <span style="display: inline-flex; align-items: center; gap: 2px; color: rgba(255,255,255,0.7); font-weight: 700;">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" stroke="currentColor" stroke-width="0.8" class="bi bi-chevron-contract" viewBox="0 0 16 16" style="vertical-align: middle;">
              <path fill-rule="evenodd" d="M3.646 13.854a.5.5 0 0 0 .708 0L8 10.207l3.646 3.647a.5.5 0 0 0 .708-.708l-4-4a.5.5 0 0 0-.708 0l-4 4a.5.5 0 0 0 0 .708m0-11.708a.5.5 0 0 1 .708 0L8 5.793l3.646-3.647a.5.5 0 0 1 .708.708l-4 4a.5.5 0 0 1-.708 0l-4-4a.5.5 0 0 1 0-.708"/>
            </svg>plagia<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" stroke="currentColor" stroke-width="0.8" class="bi bi-chevron-contract" viewBox="0 0 16 16" style="vertical-align: middle;">
              <path fill-rule="evenodd" d="M3.646 13.854a.5.5 0 0 0 .708 0L8 10.207l3.646 3.647a.5.5 0 0 0 .708-.708l-4-4a.5.5 0 0 0-.708 0l-4 4a.5.5 0 0 0 0 .708m0-11.708a.5.5 0 0 1 .708 0L8 5.793l3.646-3.647a.5.5 0 0 1 .708.708l-4 4a.5.5 0 0 1-.708 0l-4-4a.5.5 0 0 1 0-.708"/>
            </svg>
        </span>
        <span>| All Rights Reserved 2026</span>
    </footer>
</body>

</html>
